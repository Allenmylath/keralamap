<script type="module">
  // ── WASM init ──────────────────────────────────────────────────────────────
  import init, {
    filter_by_district,
    get_stats,
    point_in_village,
  } from './pkg/kerala_map.js';

  await init(); // loads and compiles the .wasm binary

  // ── Map init ───────────────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [10.8505, 76.2711],
    zoom: 8,
    zoomControl: true,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // ── State ──────────────────────────────────────────────────────────────────
  let geojsonLayer  = null;
  let allDataStr    = null; // keep raw string — Rust works on strings
  let allData       = null; // parsed JS object for Leaflet
  let selectedLayer = null;

  const STYLE_DEFAULT  = { fillColor: '#3b82f6', color: '#1e3a5f', weight: 0.6,  fillOpacity: 0.25 };
  const STYLE_HOVER    = { fillColor: '#fbbf24', color: '#fff',    weight: 1.2,  fillOpacity: 0.55 };
  const STYLE_SELECTED = { fillColor: '#f97316', color: '#fff',    weight: 1.5,  fillOpacity: 0.7  };

  // ── Bottom sheet helpers (unchanged) ──────────────────────────────────────
  const sheet = document.getElementById('bottom-sheet');
  function openSheet()  { sheet.classList.add('open'); }
  function closeSheet() { sheet.classList.remove('open'); }

  (function initSwipeDismiss() {
    const handle = document.getElementById('sheet-handle');
    let startY = 0;
    handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; sheet.style.transition = 'none'; }, { passive: true });
    handle.addEventListener('touchmove',  e => { const dy = e.touches[0].clientY - startY; if (dy > 0) sheet.style.transform = `translateY(${dy}px)`; }, { passive: true });
    handle.addEventListener('touchend',   e => {
      sheet.style.transition = '';
      if (e.changedTouches[0].clientY - startY > 80) {
        closeSheet(); sheet.style.transform = '';
        if (selectedLayer) { geojsonLayer.resetStyle(selectedLayer); selectedLayer = null; }
      } else { sheet.style.transform = ''; }
    }, { passive: true });
  })();

  // ── GeoJSON layer builder (unchanged) ─────────────────────────────────────
  function buildLayer(data) {
    return L.geoJSON(data, {
      style: STYLE_DEFAULT,
      onEachFeature(feature, layer) {
        const p = feature.properties;
        layer.bindTooltip(p.NAME, { sticky: true, direction: 'top', offset: [0, -4] });
        layer.on({
          mouseover(e) { if (layer !== selectedLayer) e.target.setStyle(STYLE_HOVER); e.target.bringToFront(); },
          mouseout(e)  { if (layer !== selectedLayer) geojsonLayer.resetStyle(e.target); },
          click(e) {
            L.DomEvent.stopPropagation(e);
            if (selectedLayer && selectedLayer !== layer) geojsonLayer.resetStyle(selectedLayer);
            selectedLayer = layer;
            layer.setStyle(STYLE_SELECTED);
            layer.bringToFront();
            showVillage(p, e.latlng);
            showSheet(p, e.latlng);
          },
        });
      },
    });
  }

  // ── Sidebar + sheet update (unchanged) ────────────────────────────────────
  function showVillage(props, latlng) {
    document.getElementById('result-card').classList.remove('empty');
    document.getElementById('village-name').textContent     = props.NAME     || '—';
    document.getElementById('meta-district').textContent    = props.DISTRICT || '—';
    document.getElementById('meta-subdistrict').textContent = props.SUB_DIST || '—';
    document.getElementById('meta-cenid').textContent       = props.CEN_2001 || '—';
    document.getElementById('village-meta').style.display   = 'flex';
    document.getElementById('coords-display').innerHTML =
      `Lat &nbsp;<b>${latlng.lat.toFixed(5)}</b><br>Lng &nbsp;<b>${latlng.lng.toFixed(5)}</b>`;
  }

  function showSheet(props, latlng) {
    document.getElementById('sheet-village-name').textContent = props.NAME     || '—';
    document.getElementById('sheet-district').textContent     = props.DISTRICT || '—';
    document.getElementById('sheet-subdistrict').textContent  = props.SUB_DIST || '—';
    document.getElementById('sheet-cenid').textContent        = props.CEN_2001 || '—';
    document.getElementById('sheet-coords').textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    openSheet();
  }

  map.on('click', () => {
    if (selectedLayer) { geojsonLayer.resetStyle(selectedLayer); selectedLayer = null; }
    document.getElementById('result-card').classList.add('empty');
    document.getElementById('village-name').textContent = 'Click a village';
    document.getElementById('village-meta').style.display = 'none';
    document.getElementById('coords-display').textContent = '—';
    closeSheet();
  });

  // ── District filter — NOW CALLS RUST ──────────────────────────────────────
  function applyDistrictFilter(val) {
    // filter_by_district() is a Rust function — called like any JS function
    const filteredStr  = filter_by_district(allDataStr, val);
    const filteredData = JSON.parse(filteredStr);

    if (geojsonLayer) map.removeLayer(geojsonLayer);
    geojsonLayer = buildLayer(filteredData).addTo(map);

    if (val === 'all') {
      map.flyTo([10.8505, 76.2711], 8, { duration: 1 });
    } else {
      map.flyToBounds(geojsonLayer.getBounds(), { padding: [40, 40], duration: 1 });
    }

    selectedLayer = null;
    closeSheet();
  }

  // ── District dropdowns ────────────────────────────────────────────────────
  function populateDistricts(data) {
    const districts = [...new Set(
      data.features.map(f => f.properties.DISTRICT).filter(Boolean)
    )].sort();

    const desktopSel = document.getElementById('district-select');
    const mobileSel  = document.getElementById('header-district-select');

    districts.forEach(d => {
      [desktopSel, mobileSel].forEach(sel => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        sel.appendChild(opt);
      });
    });

    desktopSel.addEventListener('change', () => {
      mobileSel.value = desktopSel.value;
      applyDistrictFilter(desktopSel.value);
    });
    mobileSel.addEventListener('change', () => {
      desktopSel.value = mobileSel.value;
      applyDistrictFilter(mobileSel.value);
    });
  }

  // ── Load GeoJSON ──────────────────────────────────────────────────────────
  fetch('village.geojson')
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); }) // .text() not .json()
    .then(rawStr => {
      const rawData = JSON.parse(rawStr);

      // Filter Kerala — still done in JS since it's a one-time parse
      allData = {
        type: 'FeatureCollection',
        features: rawData.features.filter(f => f.properties.STATE === 'Kerala'),
      };

      // Keep the string version for Rust
      allDataStr = JSON.stringify(allData);

      // ── Rust: get stats ──────────────────────────────────────────────────
      const stats = JSON.parse(get_stats(allDataStr));
      document.getElementById('stat-villages').textContent = stats.villages;

      geojsonLayer = buildLayer(allData).addTo(map);
      populateDistricts(allData);

      // ── Demo: point_in_village (fires once on map click) ────────────────
      // You can now call: point_in_village(allDataStr, lat, lng)
      // Returns village name string or "" if outside all polygons

      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => loading.style.display = 'none', 500);
    })
    .catch(err => {
      document.getElementById('loading').innerHTML =
        `<div style="color:#f87171;text-align:center">
          <b>Failed to load village.geojson</b><br>
          <span style="font-size:0.8rem;color:#8b949e">${err.message}</span>
        </div>`;
    });
</script>
